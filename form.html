<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application form</title>
</head>
<style>
    body{background-color:lightblue;}
    h1{color:#B4886B;text-align:center;font-size:50px;}
    label{color:#B4886B;font-weight: bold;display: block;width: 75px;float: left;}
    input{border:2px solid red;}
    input[type="submit"]{border:2px blue;font-size:16px;background-color:blue;color:#B4886B;font-weight:bold;}
</style>
<body>
<h1>APPLICATION FORM</h1>
<form>
    <label for="fname">Name:</label>
    <input type="text" id="fname" name="fname"><br>
    <br><label for="id">ID:</label>
    <input type="text" id="id" name="id"><br>
    <br><label for="age">Age:</label>
    <input type="number" id="age" name="age"><br>
    <br><label for="pass">Password:</label>
    <input type="password" id="pass" name="pass"><br>
    <br><input type="submit" value="Submit">
</form>
</body>
</html>
